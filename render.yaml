services:
  # Frontend Service (Next.js)
  - type: web
    name: sidespark-frontend
    env: node
    buildCommand: cd frontend && pnpm install --frozen-lockfile && pnpm build
    startCommand: cd frontend && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://sidespark-backend.onrender.com

  # Backend Service (Express + Prisma)
  - type: web
    name: sidespark-backend
    env: node
    buildCommand: cd backend && pnpm install --frozen-lockfile && pnpm build && npx prisma generate
    startCommand: cd backend && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: sidespark-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://sidespark-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true

# PostgreSQL Database
databases:
  - name: sidespark-db
    databaseName: sidespark
    user: sidespark_user
