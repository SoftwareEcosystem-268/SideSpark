services:
  - type: web
    name: sidespark-frontend
    env: node
    rootDir: frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://sidespark-frontend.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: https://sidespark-backend.onrender.com

  - type: web
    name: sidespark-backend
    env: node
    rootDir: backend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    preDeployCommand: pnpm exec prisma migrate deploy
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sidespark-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://sidespark-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d

databases:
  - name: sidespark-db
    databaseName: sidespark
    user: sidespark_user
